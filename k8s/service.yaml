apiVersion: v1
kind: Service
metadata:
  name: chess-compare
  labels:
    app: chess-compare
spec:
  type: ClusterIP
  selector:
    app: chess-compare
  ports:
    - name: http
      port: 80
      targetPort: http
# If you add an Ingress in front of this Service, exclude /metrics from public
# routing — it is meant to be scraped over the pod network, not the internet.
